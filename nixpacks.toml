# Laravel Cloud builds the deploy image with Nixpacks.
#
# Google publishes NO Chrome / Chrome-for-Testing build for linux-arm64, and
# Laravel Cloud's runtime is ARM64 (aarch64). That means puppeteer's bundled
# Chromium download is an x86-64 binary that cannot execute here ("Exec format
# error"). The fix is to install the distro's NATIVE arm64 Chromium via apt and
# point Browsershot at it.
#
# Pair this with an environment variable in the Laravel Cloud dashboard:
#   BROWSERSHOT_CHROME_PATH=/usr/bin/chromium
#
# (config/browsershot.php already reads BROWSERSHOT_CHROME_PATH.)
#
# Verify after deploy with:  php artisan browsershot:diagnose
[phases.setup]
aptPkgs = ['chromium']
